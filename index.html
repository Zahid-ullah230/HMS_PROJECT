<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Patient Portal | Central Hospital</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="style.css">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body class="bg-light">

    <nav class="navbar navbar-expand-lg navbar-dark bg-primary shadow-sm">
        <div class="container">
            <a class="navbar-brand fw-bold" href="#"><i class="fa-solid fa-house-medical-flag"></i> Central Hospital</a>
            <span class="navbar-text text-white">Patient Portal</span>
        </div>
    </nav>

    <div class="container my-5">
        <div class="row g-4">
            <div class="col-md-5">
                <div class="card shadow-sm border-0 rounded-3">
                    <div class="card-body p-4">
                        <h3 class="card-title fw-bold mb-4 text-primary">Book Appointment</h3>
                        
                        <div id="validationError" class="alert alert-danger d-none" role="alert"></div>

                        <form id="appointmentForm" novalidate>
                            <div class="mb-3">
                                <label class="form-label font-weight-bold">Patient Full Name</label>
                                <input type="text" id="patientName" class="form-control" placeholder="e.g. Zahid Khan">
                            </div>
                            <div class="mb-3">
                                <label class="form-label">Select Speciality Doctor</label>
                                <select id="doctorSelect" class="form-select">
                                    </select>
                            </div>
                            <div class="mb-3">
                                <label class="form-label">Appointment Date</label>
                                <input type="date" id="appDate" class="form-control">
                            </div>
                            <div class="mb-3">
                                <label class="form-label">Contact Mobile Number</label>
                                <input type="text" id="patientPhone" class="form-control" placeholder="e.g. 03001234567">
                            </div>
                            <div class="mb-3">
                                <label class="form-label">Reason for Visit</label>
                                <textarea id="appReason" class="form-control" rows="3" placeholder="Describe symptoms..."></textarea>
                            </div>
                            <button type="submit" class="btn btn-primary w-100 fw-bold py-2">Confirm Booking</button>
                        </form>
                    </div>
                </div>
            </div>

            <div class="col-md-7">
                <div class="card shadow-sm border-0 rounded-3">
                    <div class="card-body p-4">
                        <div class="d-flex justify-content-between align-items-center mb-4">
                            <h3 class="card-title fw-bold text-dark m-0">Our Medical Specialists</h3>
                            <select id="deptFilter" class="form-select w-50">
                                <option value="All">All Departments</option>
                                <option value="Cardiology">Cardiology</option>
                                <option value="Neurology">Neurology</option>
                                <option value="Pediatrics">Pediatrics</option>
                            </select>
                        </div>

                        <div id="loadingState" class="text-center my-4">
                            <div class="spinner-border text-primary" role="status"></div>
                            <p class="mt-2 text-muted">Fetching medical staff entries...</p>
                        </div>
                        <div id="errorState" class="alert alert-danger d-none" role="alert">
                            <i class="fa-solid fa-triangle-exclamation"></i> Unable to connect to hospital services database.
                        </div>

                        <div class="table-responsive">
                            <table class="table table-hover align-middle d-none" id="doctorsTable">
                                <thead class="table-light">
                                    <tr>
                                        <th>Doctor Name</th>
                                        <th>Specialization</th>
                                        <th>Department</th>
                                    </tr>
                                </thead>
                                <tbody id="doctorsGrid"></tbody>
                            </table>
                        </div>

                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
